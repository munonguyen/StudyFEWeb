<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .form-group {
        width: 100%;
        margin-bottom: 12px;
      }

      .form-group label {
        display: block;
        margin-bottom: 6px;
      }
      .form-edu label {
        display: block;
        margin-bottom: 6px;
      }
      #edu-form {
        width: 100%;
        height: 30px;
        padding: 6px 10px;
        box-sizing: border-box;
        border: 1px solid #d8dde3;
        border-radius: 4px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.15);
        outline: none;
      }

      .form-group input {
        width: 100%;
        height: 30px;
        padding: 6px 10px;
        box-sizing: border-box;
        border: 1px solid #d8dde3;
        border-radius: 4px;
        box-shadow: 0 1px 5px rgba(0, 0, 0, 0.15);
        outline: none;
      }
      .form-select {
        margin-bottom: 12px;
      }
      #avatar-preview-box {
        display: none;
        align-items: flex-end;
        gap: 12px;
        margin-top: 12px;
      }
      #avatar-preview {
        width: 100px;
        height: 100px;
        object-fit: cover;
      }
      #avatar-preview-box button {
        padding: 0px 16px;
        height: 36px;
      }
      #save-btn {
        width: 50px;
        height: 30px;
        background-color: #0d8bf2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      #reset-btn {
        width: 50px;
        height: 30px;
        background-color: #0d8bf2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      #btn-delete {
        width: 70px;
        height: 30px;
        background-color: #0d8bf2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-delete {
        width: 70px;
        height: 30px;
        background-color: #0d8bf2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .form-btn {
        padding: 13px 0px;
      }
      #display table {
        border-collapse: collapse;
        margin-top: 16px;
        width: 100%;
      }
      #display th,
      #display td {
        border: 1px solid #d8dde3;
        padding: 8px;
        text-align: left;
      }
      #display th:first-child,
      #display td:first-child {
        text-align: center;
        width: 48px;
      }
      #display img {
        width: 80px;
        height: 80px;
        object-fit: cover;
      }
      #display th {
        background-color: darkviolet;
        border: 1px solid #d8dde3;
        padding: 8px;
        text-align: left;
        color: white;
      }
      .btn-edit {
        width: 40px;
        height: 20px;
        background-color: #0d8bf2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      .btn-del {
        width: 50px;
        height: 20px;
        background-color: #0d8bf2;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="form-group">
      <label for="id-form">Id:</label>
      <input type="text" id="id-form" placeholder="Nhập id của bạn" />
    </div>
    <div class="form-group">
      <label for="name-form">Name:</label>
      <input type="text" placeholder="Nhập tên của bạn" id="name-form" />
    </div>
    <div class="form-group">
      <label for="avatar-form">Avatar:</label>
      <input type="file" id="avatar-form" />
      <div id="avatar-preview-box" class="avatar-preview-box">
        <img id="avatar-preview" src="" alt="Avarta preview" />
        <button type="button" class="btn-delete" onclick="deleteAvatar()">
          Delete
        </button>
      </div>
    </div>
    <div class="form-group">
      <label for="address-form">Address:</label>
      <input type="text" placeholder="Nhập địa chỉ của bạn" id="address-form" />
    </div>
    <div class="form-group">
      <label for="salary-form">Salary:</label>
      <input type="text" placeholder="Nhập lương của bạn" id="salary-form" />
    </div>
    <div class="form-group">
      <label for="des-form">Description:</label>
      <input type="text" placeholder="Nhập mô tả về bạn" id="des-form" />
    </div>
    <div class="form-select">
      <label for="gender">Gender:</label>
      <input type="radio" name="gender" value="male" id="male" />
      <label for="male">Male</label>
      <input type="radio" name="gender" value="female" id="female" />
      <label for="female">Female</label>
      <input type="radio" name="gender" value="other" id="other" />
      <label for="other">Other</label>
    </div>
    <div class="form-select">
      <label for="married-form">Married: </label>
      <input type="checkbox" id="married-form" />
    </div>
    <div class="form-edu">
      <label for="edu-form">Education:</label>
      <select id="edu-form">
        <option value="">Chọn trình độ học vấn</option>
        <option value="highschool">High School</option>
        <option value="bachelor">Bachelor's Degree</option>
        <option value="master">Master's Degree</option>
        <option value="doctor">Doctorate Degree</option>
      </select>
    </div>
    <div class="form-btn">
      <button id="save-btn" onclick="handleSave()" type="button">Save</button>
      <button id="reset-btn" onclick="handleReset()" type="button">
        Reset
      </button>
      <button id="btn-delete" onclick="handleDelete()" type="button">
        Clear data
      </button>
    </div>
    <div id="display"></div>
    <script src="main.js"></script>
  </body>
</html>
